<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Landmark Guessing Game</title>

<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --text: #f8fafc;
    --accent: #38bdf8;
    --map-size: min(80vw, 500px);
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 10px;
  }

  h1 {
    margin-bottom: 10px;
    font-size: 1.8rem;
  }

  #world {
    position: relative;
    width: var(--map-size);
    height: var(--map-size);
    background: #0a0f1f;
    border: 2px solid #334155;
    border-radius: 12px;
    margin-top: 20px;
    overflow: hidden;
  }

  /* Landmark shapes */
  .shape-square {
    width: 18px;
    height: 18px;
    background: var(--color);
  }

  .shape-circle {
    width: 18px;
    height: 18px;
    background: var(--color);
    border-radius: 50%;
  }

  .shape-triangle {
    width: 0;
    height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 18px solid var(--color);
  }

  .shape-ring {
    width: 18px;
    height: 18px;
    border: 3px solid var(--color);
    border-radius: 50%;
    background: transparent;
  }

  .shape-diamond {
    width: 16px;
    height: 16px;
    background: var(--color);
    transform: rotate(45deg);
  }

  .shape-rect {
    width: 22px;
    height: 12px;
    background: var(--color);
  }

  .landmark {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
  }

  .label {
    position: absolute;
    transform: translate(-50%, -120%);
    font-size: 0.75rem;
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 4px;
    pointer-events: none;
    white-space: nowrap;
  }

  #info {
    margin-top: 20px;
    background: var(--panel);
    padding: 15px;
    border-radius: 10px;
    width: min(90vw, 450px);
    text-align: center;
    font-size: 1rem;
  }
</style>
</head>

<body>

<h1>Landmark Guessing Game</h1>
<div id="info">Click the landmark you think matches the description.</div>

<div id="world"></div>

<script>
/* Landmark definitions */
const landmarks = [
  { id: "A", name: "Green Square City", x: 15, y: 20, color: "#22c55e", shape: "square" },
  { id: "B", name: "Blue Circle Lake", x: 80, y: 25, color: "#38bdf8", shape: "circle" },
  { id: "C", name: "Orange Triangle Hub", x: 50, y: 10, color: "#f97316", shape: "triangle" },
  { id: "D", name: "Purple Ring Station", x: 25, y: 75, color: "#a855f7", shape: "ring" },
  { id: "E", name: "Yellow Plaza", x: 70, y: 70, color: "#eab308", shape: "diamond" },
  { id: "F", name: "Red Block Port", x: 40, y: 50, color: "#ef4444", shape: "rect" }
];

const world = document.getElementById("world");
const info = document.getElementById("info");

/* Render landmarks */
function renderLandmarks() {
  world.innerHTML = "";

  landmarks.forEach(lm => {
    const dot = document.createElement("div");
    dot.className = `landmark shape-${lm.shape}`;
    dot.style.setProperty("--color", lm.color);
    dot.style.left = lm.x + "%";
    dot.style.top = lm.y + "%";

    dot.onclick = () => {
      info.textContent = `You clicked: ${lm.name}`;
    };

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = lm.id;

    dot.appendChild(label);
    world.appendChild(dot);
  });
}

renderLandmarks();
</script>

</body>
</html>
